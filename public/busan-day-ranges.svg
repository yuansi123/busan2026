<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Busan 2026 day ranges</title>
  <desc id="desc">A stylized Busan route map marking the main area for each day.</desc>
  <defs>
    <linearGradient id="sea" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dff7ff"/>
      <stop offset="1" stop-color="#b7e5f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172033" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect width="1200" height="820" rx="36" fill="#f7f3ed"/>
  <path d="M0 95 C190 40 310 110 480 78 C690 36 780 132 970 88 C1080 62 1140 72 1200 50 L1200 820 L0 820 Z" fill="url(#sea)"/>
  <path d="M132 606 C235 526 276 414 373 378 C492 334 566 386 661 310 C765 225 874 222 1000 172" fill="none" stroke="#ffffff" stroke-width="90" stroke-linecap="round" opacity=".86"/>
  <path d="M132 606 C235 526 276 414 373 378 C492 334 566 386 661 310 C765 225 874 222 1000 172" fill="none" stroke="#0f766e" stroke-width="12" stroke-linecap="round" stroke-dasharray="22 18"/>

  <text x="64" y="88" fill="#172033" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="44" font-weight="900">Busan 2026 每日活動範圍</text>
  <text x="66" y="128" fill="#556070" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="22" font-weight="700">同區排一起：海雲台 / 東釜山 / 南浦影島 / 廣安里 / 西面田浦</text>

  <g filter="url(#shadow)">
    <rect x="76" y="430" width="242" height="132" rx="22" fill="#0f766e"/>
    <text x="102" y="474" fill="#ffffff" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="900">DAY 1</text>
    <text x="102" y="512" fill="#ffffff" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="22" font-weight="800">海雲台</text>
    <text x="102" y="545" fill="#d9fff8" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="18">飯店、湯飯、夜海</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="392" y="168" width="300" height="146" rx="22" fill="#2563eb"/>
    <text x="420" y="214" fill="#ffffff" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="900">DAY 2</text>
    <text x="420" y="252" fill="#ffffff" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="22" font-weight="800">尾浦・青沙浦・機張</text>
    <text x="420" y="286" fill="#dbeafe" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="18">膠囊列車、龍宮寺、Luge、吃蟹</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="178" y="248" width="286" height="142" rx="22" fill="#d97706"/>
    <text x="206" y="294" fill="#ffffff" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="900">DAY 3</text>
    <text x="206" y="332" fill="#ffffff" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="22" font-weight="800">南浦・松島・影島</text>
    <text x="206" y="366" fill="#fff7ed" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="18">豚笑、纜車、白淺灘、Momos</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="700" y="326" width="288" height="150" rx="22" fill="#7c3aed"/>
    <text x="728" y="372" fill="#ffffff" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="900">DAY 4</text>
    <text x="728" y="410" fill="#ffffff" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="22" font-weight="800">Centum・廣安里</text>
    <text x="728" y="444" fill="#f3e8ff" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="18">新世界、烤肉、遊艇、無人機</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="518" y="562" width="286" height="142" rx="22" fill="#db2777"/>
    <text x="546" y="608" fill="#ffffff" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="900">DAY 5</text>
    <text x="546" y="646" fill="#ffffff" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="22" font-weight="800">西面・田浦・機場</text>
    <text x="546" y="680" fill="#fce7f3" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="18">咖啡街、補買、60炸雞、返程</text>
  </g>

  <g fill="#172033" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="18" font-weight="800">
    <circle cx="174" cy="590" r="9" fill="#0f766e"/>
    <text x="190" y="596">海雲台</text>
    <circle cx="552" cy="324" r="9" fill="#2563eb"/>
    <text x="568" y="330">東釜山</text>
    <circle cx="278" cy="406" r="9" fill="#d97706"/>
    <text x="294" y="412">南浦/影島</text>
    <circle cx="838" cy="496" r="9" fill="#7c3aed"/>
    <text x="854" y="502">廣安里</text>
    <circle cx="650" cy="724" r="9" fill="#db2777"/>
    <text x="666" y="730">西面/田浦</text>
  </g>

  <text x="64" y="770" fill="#556070" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="18" font-weight="700">提示：這是分區示意圖，不是精準比例地圖；實際導航以 Naver Map / Google Maps 當下路況為準。</text>
</svg>
